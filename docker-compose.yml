services:
  postgres:
    image: postgres:16-alpine
    container_name: sql_shop_management
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sql_learning
    ports:
      - "5432:5432"
    volumes:
      - ./tmp/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sql_learning"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: